<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon says</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/header.css" />
    <link rel="stylesheet" href="./assets/css/info-box.css" />
  </head>
  <body>
    <div class="game-wrapper">
      <!-- Game Name -->
      <section class="game-header">
        <div class="logo-dots">
          <div class="logo-dot g"></div>
          <div class="logo-dot r"></div>
          <div class="logo-dot y"></div>
          <div class="logo-dot b"></div>
        </div>
        <h1 class="title">Simon</h1>
      </section>
      <p class="subtitle">Think you can handle 5 rounds?</p>

      <!-- Gamescore overview -->
      <section class="info-box">
        <div class="level info-element">
          <h2>Level</h2>
          <p>-</p>
        </div>
        <div class="info-divider"></div>
        <div class="points info-element">
          <h2>Points</h2>
          <p>0</p>
        </div>
        <div class="info-divider"></div>
        <div class="highscore info-element">
          <h2>Highscore</h2>
          <p>0</p>
        </div>
      </section>

      <!-- Game Buttons -->

      <!-- Game settings -->
    </div>
  </body>
</html>
