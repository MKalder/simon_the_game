<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Simon says</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./assets/css/style.css" />
    <link rel="stylesheet" href="./assets/css/header.css" />
    <link rel="stylesheet" href="./assets/css/info-box.css" />
    <link rel="stylesheet" href="./assets/css/simon-board.css" />
    <link rel="stylesheet" href="./assets/css/game-settings.css" />
  </head>
  <body>
    <div class="game-wrapper">
      <!-- Game Name -->
      <section class="game-header">
        <div class="logo-dots">
          <div class="logo-dot g"></div>
          <div class="logo-dot r"></div>
          <div class="logo-dot y"></div>
          <div class="logo-dot b"></div>
        </div>
        <h1 class="title">Simon</h1>
      </section>
      <p class="subtitle">Think you can handle 5 rounds?</p>

      <!-- Gamescore overview -->
      <section class="info-box">
        <div class="level info-element">
          <h2>Level</h2>
          <p>-</p>
        </div>
        <div class="info-divider"></div>
        <div class="points info-element">
          <h2>Points</h2>
          <p>0</p>
        </div>
        <div class="info-divider"></div>
        <div class="highscore info-element">
          <h2>Highscore</h2>
          <p>0</p>
        </div>
      </section>

      <!-- SIMON BOARD -->
      <main>
        <p class="game-info hidden">Press the Start Button</p>
        <section class="simon-board">
          <button class="green play-btn disabled"></button>
          <button class="red play-btn disabled"></button>
          <button class="yellow play-btn disabled"></button>
          <button class="blue play-btn disabled"></button>
          <div class="board-center disabled"></div>
        </section>

        <!-- GAME SETTINGS -->
        <section class="game-settings">
          <label class="toggle-card" tabindex="0">
            <div class="toggle-info">
              <div class="toggle-icon">⏱️</div>
              <div class="toggle-text">
                <span class="toggle-label">Speed-Modus</span>
                <span class="toggle-desc">Normal Speed oder Turbo</span>
              </div>
              <span class="toggle-badge badge-beta">Beta</span>
            </div>
            <div class="toggle-switch">
              <input type="checkbox" />
              <div class="toggle-track"></div>
              <div class="toggle-thumb"></div>
            </div>
          </label>
        </section>
      </main>

      <!-- Game settings -->
    </div>
  </body>
</html>
